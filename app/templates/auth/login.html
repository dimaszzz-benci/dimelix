{% extends 'base.html' %}

{% block title %}Login — Dimelix{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card bg-secondary text-white shadow">
            <div class="card-body p-4">
                <h4 class="text-center mb-4 fw-bold">Login ke Dimelix</h4>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control bg-dark text-white border-secondary"
                            placeholder="email@kamu.com"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control bg-dark text-white border-secondary"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-danger w-100 fw-bold">
                        Masuk
                    </button>
                </form>

                <p class="text-center mt-3 small">
                    Belum punya akun?
                    <a href="{{ url_for('auth.register') }}" class="text-danger">Daftar di sini</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
