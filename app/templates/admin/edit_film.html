{% extends 'base.html' %}
{% block title %}Edit Film — Dimelix{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card bg-secondary text-white shadow">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4">✏️ Edit Film</h5>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Judul Film *</label>
                        <input type="text" name="title"
                               class="form-control bg-dark text-white border-secondary"
                               value="{{ film.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deskripsi</label>
                        <textarea name="description" rows="3"
                                  class="form-control bg-dark text-white border-secondary"
                                  >{{ film.description or '' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">Genre</label>
                            <input type="text" name="genre"
                                   class="form-control bg-dark text-white border-secondary"
                                   value="{{ film.genre or '' }}">
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">Tahun</label>
                            <input type="number" name="year"
                                   class="form-control bg-dark text-white border-secondary"
                                   value="{{ film.year or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL Poster</label>
                        <input type="text" name="poster_url"
                               class="form-control bg-dark text-white border-secondary"
                               value="{{ film.poster_url or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL Video</label>
                        <input type="text" name="video_url"
                               class="form-control bg-dark text-white border-secondary"
                               value="{{ film.video_url or '' }}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning fw-bold">Update Film</button>
                        <a href="{{ url_for('admin.dashboard') }}"
                           class="btn btn-outline-light">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
