{% extends 'base.html' %}
{% block title %}Tambah Film — Dimelix{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card bg-secondary text-white shadow">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4">➕ Tambah Film Baru</h5>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Judul Film *</label>
                        <input type="text" name="title"
                               class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deskripsi</label>
                        <textarea name="description" rows="3"
                                  class="form-control bg-dark text-white border-secondary"></textarea>
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">Genre</label>
                            <input type="text" name="genre"
                                   class="form-control bg-dark text-white border-secondary"
                                   placeholder="Action, Romance, dll">
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">Tahun</label>
                            <input type="number" name="year"
                                   class="form-control bg-dark text-white border-secondary"
                                   placeholder="2024">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL Poster</label>
                        <input type="text" name="poster_url"
                               class="form-control bg-dark text-white border-secondary"
                               placeholder="https://...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL Video</label>
                        <input type="text" name="video_url"
                               class="form-control bg-dark text-white border-secondary"
                               placeholder="https://youtube.com/embed/xxx">
                        <small class="text-warning">
                            ⚠️ Untuk YouTube, gunakan link /embed/ bukan link biasa!
                        </small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger fw-bold">Simpan Film</button>
                        <a href="{{ url_for('admin.dashboard') }}"
                           class="btn btn-outline-light">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
